    <circle class="chair" cx="72" cy="-8" r="11"/>
    <circle class="chair" cx="120" cy="-8" r="11"/>
    <circle class="chair" cx="-28" cy="34" r="11"/>
    <circle class="chair" cx="-28" cy="78" r="11"/>
    <rect class="desk" x="0" y="18" width="48" height="76"/>
    <rect class="desk" x="48" y="18" width="48" height="76"/>
    <rect class="desk" x="96" y="18" width="48" height="76"/>
    <circle class="chair" cx="172" cy="34" r="11"/>
