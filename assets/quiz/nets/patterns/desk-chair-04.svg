    <circle class="chair" cx="124" cy="34" r="11"/>
    <circle class="chair" cx="124" cy="78" r="11"/>
    <circle class="chair" cx="24" cy="122" r="11"/>
    <circle class="chair" cx="72" cy="122" r="11"/>
  </g>
  <g transform="translate(340 370)">
    <text class="label" x="-30" y="-44">3단계: 3 × 2 + 4 = 10</text>
