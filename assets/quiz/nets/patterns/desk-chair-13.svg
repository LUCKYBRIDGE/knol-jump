<svg xmlns="http://www.w3.org/2000/svg" width="900" height="540" viewBox="0 0 900 540" role="img" aria-label="힌트가 있는 책상 수 10일 때 의자 수를 묻는 대응표">
  <style>
    .bg{fill:#fffafa}.panel{fill:#fff;stroke:#e0c9c9;stroke-width:4}.body{font-weight:900;font-size:38px;font-family:sans-serif;fill:#47302f}.table{fill:#fff;stroke:#b99292;stroke-width:4}.head{fill:#fff0f0}.cell{stroke:#b99292;stroke-width:4}.label{font-weight:800;font-size:27px;font-family:sans-serif;fill:#47302f}.num{font-weight:900;font-size:36px;font-family:sans-serif;fill:#321f1f}.dots{font-weight:900;font-size:36px;font-family:sans-serif;fill:#7a6262}.blank{fill:#fff7de;stroke:#f0a800;stroke-width:5}.question{font-weight:900;font-size:42px;font-family:sans-serif;fill:#d23a1f}.hintBox{fill:#f4fbf1;stroke:#8abf92;stroke-width:4}.hint{font-weight:800;font-size:26px;font-family:sans-serif;fill:#315329}
  </style>
  <rect class="bg" width="900" height="540"/>
  <rect class="panel" x="28" y="24" width="844" height="492" rx="22"/>
  <text class="body" x="58" y="88">책상 □이 10개일 때, 의자 ○는 몇 개일까요?</text>
  <g transform="translate(62 150)">
    <rect class="table" x="0" y="0" width="776" height="206" rx="16"/>
    <rect class="head" x="0" y="0" width="156" height="206" rx="16"/>
    <line class="cell" x1="156" y1="0" x2="156" y2="206"/>
    <line class="cell" x1="280" y1="0" x2="280" y2="206"/>
    <line class="cell" x1="404" y1="0" x2="404" y2="206"/>
    <line class="cell" x1="528" y1="0" x2="528" y2="206"/>
    <line class="cell" x1="652" y1="0" x2="652" y2="206"/>
    <line class="cell" x1="0" y1="103" x2="776" y2="103"/>
    <rect class="blank" x="528" y="103" width="124" height="103" rx="12"/>
    <text class="label" x="28" y="63">책상 수 □</text>
    <text class="label" x="28" y="166">의자 수 ○</text>
    <text class="num" x="218" y="64" text-anchor="middle">1</text>
    <text class="num" x="342" y="64" text-anchor="middle">2</text>
    <text class="num" x="466" y="64" text-anchor="middle">3</text>
    <text class="num" x="590" y="64" text-anchor="middle">10</text>
    <text class="dots" x="714" y="64" text-anchor="middle">...</text>
    <text class="num" x="218" y="167" text-anchor="middle">4</text>
    <text class="num" x="342" y="167" text-anchor="middle">6</text>
    <text class="num" x="466" y="167" text-anchor="middle">8</text>
    <text class="question" x="590" y="171" text-anchor="middle">?</text>
    <text class="dots" x="714" y="167" text-anchor="middle">...</text>
  </g>
  <rect class="hintBox" x="104" y="398" width="692" height="58" rx="16"/>
  <text class="hint" x="174" y="437">힌트: 책상 1개가 늘 때, 의자가 2개 늘어요.</text>
</svg>
